name: Publish content release

# Tag with `git tag content-v<n> && git push --tags` to trigger.
# The tag name becomes the GitHub Release tag and is embedded in every
# pack's assetUrl, so use a stable, monotonic naming scheme.

on:
  push:
    tags:
      - "content-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. content-v3)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build manifest + zips
        run: |
          python3 scripts/build_manifest.py \
            --tag "${{ steps.tag.outputs.value }}" \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --out dist

      - name: Validate output
        run: python3 scripts/validate_pack.py dist/manifest.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.value }}" \
            --title "${{ steps.tag.outputs.value }}" \
            --notes "Automated content release. See manifest.json for the pack list." \
            dist/manifest.json dist/*.zip
